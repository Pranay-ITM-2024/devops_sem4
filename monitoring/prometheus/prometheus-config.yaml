apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'fastapi'
        static_configs:
          - targets: ['fastapi-service.soc-app.svc.cluster.local:8000']
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
