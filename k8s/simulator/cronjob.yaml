apiVersion: batch/v1
kind: CronJob
metadata:
  name: alert-simulator
  namespace: soc-app
spec:
  schedule: "*/2 * * * *"   # Every 2 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: simulator
            image: yourusername/soc-simulator:v1
            imagePullPolicy: IfNotPresent
            env:
            - name: API_URL
              value: "http://fastapi-service:8000"
            - name: INTERVAL_SECONDS
              value: "5"
          restartPolicy: OnFailure
