apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-backend
  namespace: soc-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-backend
  template:
    metadata:
      labels:
        app: fastapi-backend
    spec:
      containers:
      - name: fastapi
        image: yourusername/soc-api:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DATABASE_URL
        livenessProbe:
          httpGet: { path: /api/health, port: 8000 }
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet: { path: /api/ready, port: 8000 }
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: soc-app
spec:
  selector:
    app: fastapi-backend
  ports:
  - port: 8000
    targetPort: 8000
